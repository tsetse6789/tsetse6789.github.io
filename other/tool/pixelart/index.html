<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Converter (MP4/GIF)</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { border-bottom: 2px solid #a6e3a1; padding-bottom: 10px; color: #a6e3a1; }
        .controls {
            background: #313244;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .control-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        label { font-weight: bold; min-width: 120px; }
        input[type="number"] {
            background: #45475a;
            color: white;
            border: 1px solid #585b70;
            padding: 5px 10px;
            border-radius: 4px;
            width: 80px;
        }
        input[type="file"] {
            background: #45475a;
            padding: 10px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
        }
        button {
            background: #a6e3a1;
            color: #1e1e2e;
            border: none;
            padding: 15px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-size: 16px;
            text-transform: uppercase;
        }
        button:hover { background: #94e2d5; transform: translateY(-1px); }
        button:disabled { background: #585b70; color: #a6adc8; cursor: not-allowed; transform: none; }
        
        .preview-container { text-align: center; margin-bottom: 20px; background: #11111b; border-radius: 8px; padding: 10px; }
        video, img { max-width: 100%; max-height: 300px; border-radius: 4px; }
        
        #log-output {
            background: #11111b;
            color: #fab387;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid #45475a;
        }
        .status-badge { font-size: 0.8em; padding: 2px 8px; border-radius: 10px; margin-left: 10px; }
        .online { background: #a6e3a1; color: #1e1e2e; }
        .offline { background: #f38ba8; color: #1e1e2e; }
    </style>
</head>
<body>

    <h1>Pixel Art Scaler <span id="isolation-status" class="status-badge offline">Checking...</span></h1>
    
    <div class="preview-container" id="preview-container" style="display: none;">
        <video id="preview-video" controls loop style="display: none;"></video>
        <img id="preview-img" style="display: none;" />
    </div>

    <div class="controls">
        <div>
            <label for="file-upload">Upload MP4 or GIF:</label>
            <input type="file" id="file-upload" accept=".mp4, .gif">
        </div>

        <div class="control-group">
            <label>Scaling Mode:</label>
            <input type="radio" name="scale-mode" id="mode-multiplier" value="multiplier" checked>
            <label for="mode-multiplier" style="min-width: auto;">Multiplier (n*n)</label>
            <input type="radio" name="scale-mode" id="mode-resolution" value="resolution">
            <label for="mode-resolution" style="min-width: auto;">Custom Resolution</label>
        </div>

        <div class="control-group" id="multiplier-settings">
            <label for="scale-factor">Multiplier (n):</label>
            <input type="number" id="scale-factor" value="32" min="1" max="50">
            <span>x bigger (Nearest Neighbor)</span>
        </div>

        <div class="control-group" id="resolution-settings" style="display: none;">
            <label for="res-width">Width:</label>
            <input type="number" id="res-width" value="2048">
            <label for="res-height" style="margin-left: 10px; min-width: auto;">Height:</label>
            <input type="number" id="res-height" value="2048">
        </div>

        <button id="btn-convert" disabled>Load a file to start</button>
    </div>

    <h3>Processing Logs</h3>
    <div id="log-output">System idle...</div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true,
            // Explicitly point to the core for better compatibility
            corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
        });

        const isolationStatus = document.getElementById('isolation-status');
        const fileUpload = document.getElementById('file-upload');
        const btnConvert = document.getElementById('btn-convert');
        const logOutput = document.getElementById('log-output');
        const modeMultiplier = document.getElementById('mode-multiplier');
        const modeResolution = document.getElementById('mode-resolution');
        const multiplierSettings = document.getElementById('multiplier-settings');
        const resolutionSettings = document.getElementById('resolution-settings');
        const previewContainer = document.getElementById('preview-container');

        // Check for Cross-Origin Isolation
        if (window.crossOriginIsolated) {
            isolationStatus.innerText = "COI ENABLED";
            isolationStatus.className = "status-badge online";
        } else {
            isolationStatus.innerText = "COI DISABLED (Wait for reload)";
            isolationStatus.className = "status-badge offline";
        }

        modeMultiplier.addEventListener('change', () => {
            multiplierSettings.style.display = 'flex';
            resolutionSettings.style.display = 'none';
        });

        modeResolution.addEventListener('change', () => {
            multiplierSettings.style.display = 'none';
            resolutionSettings.style.display = 'flex';
        });

        ffmpeg.setLogger(({ message }) => {
            logOutput.innerHTML += message + '\n';
            logOutput.scrollTop = logOutput.scrollHeight;
        });

        fileUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            btnConvert.disabled = false;
            btnConvert.innerText = "Convert to Scaled MP4";
            
            const url = URL.createObjectURL(file);
            previewContainer.style.display = 'block';
            if (file.type.includes('gif')) {
                document.getElementById('preview-video').style.display = 'none';
                document.getElementById('preview-img').style.display = 'inline-block';
                document.getElementById('preview-img').src = url;
            } else {
                document.getElementById('preview-img').style.display = 'none';
                document.getElementById('preview-video').style.display = 'inline-block';
                document.getElementById('preview-video').src = url;
            }
        });

        btnConvert.addEventListener('click', async () => {
            const file = fileUpload.files[0];
            if (!file) return;

            btnConvert.disabled = true;
            btnConvert.innerText = "Initializing Engine...";

            if (!ffmpeg.isLoaded()) await ffmpeg.load();

            const inputName = `in${file.name.substring(file.name.lastIndexOf('.'))}`;
            ffmpeg.FS('writeFile', inputName, await fetchFile(file));

            let filter = "";
            if (modeMultiplier.checked) {
                const n = document.getElementById('scale-factor').value;
                filter = `scale=iw*${n}:ih*${n}:flags=neighbor`;
            } else {
                const w = document.getElementById('res-width').value;
                const h = document.getElementById('res-height').value;
                filter = `scale=${w}:${h}:flags=neighbor`;
            }

            btnConvert.innerText = "Converting... Check logs below";
            
            // Standard high-compatibility MP4 command
            await ffmpeg.run('-i', inputName, '-vf', filter, '-c:v', 'libx264', '-pix_fmt', 'yuv420p', 'out.mp4');

            const data = ffmpeg.FS('readFile', 'out.mp4');
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pixel_scaled_${file.name.split('.')[0]}.mp4`;
            a.click();

            btnConvert.innerText = "Success! Saved.";
            btnConvert.disabled = false;
        });
    </script>
</body>
</html>
