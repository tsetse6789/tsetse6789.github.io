<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Video Scaler</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { border-bottom: 2px solid #89b4fa; padding-bottom: 10px; }
        .controls {
            background: #313244;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            gap: 15px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label { font-weight: bold; min-width: 120px; }
        input[type="number"] {
            background: #45475a;
            color: white;
            border: 1px solid #585b70;
            padding: 5px 10px;
            border-radius: 4px;
            width: 80px;
        }
        input[type="file"] {
            background: #45475a;
            padding: 10px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background: #89b4fa;
            color: #1e1e2e;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #b4befe; }
        button:disabled { background: #585b70; cursor: not-allowed; }
        .canvas-container {
            background: #000;
            padding: 10px;
            border-radius: 8px;
            overflow: auto;
            text-align: center;
            border: 1px solid #585b70;
        }
        canvas {
            /* This CSS property is a fallback to ensure crispness */
            image-rendering: pixelated; 
            max-width: 100%;
            height: auto;
        }
        #hidden-video { display: none; }
    </style>
</head>
<body>

    <h1>Pixel Art Video Scaler</h1>
    
    <div class="controls">
        <div>
            <label for="video-upload">Select MP4:</label>
            <input type="file" id="video-upload" accept="video/mp4, video/*">
        </div>

        <div class="control-group">
            <label>Scale Method:</label>
            <input type="radio" name="scale-mode" id="mode-multiplier" value="multiplier" checked>
            <label for="mode-multiplier" style="min-width: auto;">Multiplier (n * n)</label>
            
            <input type="radio" name="scale-mode" id="mode-resolution" value="resolution">
            <label for="mode-resolution" style="min-width: auto;">Custom Resolution</label>
        </div>

        <div class="control-group" id="multiplier-settings">
            <label for="scale-factor">Multiplier (n):</label>
            <input type="number" id="scale-factor" value="4" min="1" max="50">
            <span>x (e.g., 1 pixel becomes 4x4)</span>
        </div>

        <div class="control-group" id="resolution-settings" style="display: none;">
            <label for="res-width">Target Width:</label>
            <input type="number" id="res-width" value="2048" min="1">
            <label for="res-height" style="margin-left: 10px; min-width: auto;">Height:</label>
            <input type="number" id="res-height" value="2048" min="1">
        </div>

        <div class="control-group">
            <button id="btn-play" disabled>Play Scaled Video</button>
            <button id="btn-record" disabled>Record & Save (WebM)</button>
            <span id="status-text">Please upload a video.</span>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="render-canvas"></canvas>
    </div>

    <video id="hidden-video" controls loop></video>

    <script>
        const videoUpload = document.getElementById('video-upload');
        const hiddenVideo = document.getElementById('hidden-video');
        const renderCanvas = document.getElementById('render-canvas');
        const ctx = renderCanvas.getContext('2d');
        
        const modeMultiplier = document.getElementById('mode-multiplier');
        const modeResolution = document.getElementById('mode-resolution');
        const multiplierSettings = document.getElementById('multiplier-settings');
        const resolutionSettings = document.getElementById('resolution-settings');
        
        const scaleFactorInput = document.getElementById('scale-factor');
        const resWidthInput = document.getElementById('res-width');
        const resHeightInput = document.getElementById('res-height');
        
        const btnPlay = document.getElementById('btn-play');
        const btnRecord = document.getElementById('btn-record');
        const statusText = document.getElementById('status-text');

        let isPlaying = false;
        let animationFrameId;
        let mediaRecorder;
        let recordedChunks = [];

        // Toggle UI based on selected scaling mode
        modeMultiplier.addEventListener('change', updateUI);
        modeResolution.addEventListener('change', updateUI);

        function updateUI() {
            if (modeMultiplier.checked) {
                multiplierSettings.style.display = 'flex';
                resolutionSettings.style.display = 'none';
            } else {
                multiplierSettings.style.display = 'none';
                resolutionSettings.style.display = 'flex';
            }
        }

        // Handle File Upload
        videoUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            hiddenVideo.src = url;
            
            hiddenVideo.onloadedmetadata = () => {
                btnPlay.disabled = false;
                btnRecord.disabled = false;
                statusText.innerText = `Loaded: ${hiddenVideo.videoWidth}x${hiddenVideo.videoHeight} original resolution.`;
                updateCanvasSize();
                
                // Draw first frame
                hiddenVideo.currentTime = 0;
                setTimeout(() => drawFrame(), 100);
            };
        });

        function updateCanvasSize() {
            if (modeMultiplier.checked) {
                const n = parseInt(scaleFactorInput.value) || 1;
                renderCanvas.width = hiddenVideo.videoWidth * n;
                renderCanvas.height = hiddenVideo.videoHeight * n;
            } else {
                renderCanvas.width = parseInt(resWidthInput.value) || hiddenVideo.videoWidth;
                renderCanvas.height = parseInt(resHeightInput.value) || hiddenVideo.videoHeight;
            }
            // CRITICAL: Disable smoothing every time canvas size changes
            ctx.imageSmoothingEnabled = false; 
        }

        function drawFrame() {
            if (!hiddenVideo.paused || !hiddenVideo.ended) {
                // Ensure image smoothing is off (some browsers reset this)
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(hiddenVideo, 0, 0, renderCanvas.width, renderCanvas.height);
            }
            
            if (isPlaying) {
                animationFrameId = requestAnimationFrame(drawFrame);
            }
        }

        // Play / Pause Logic
        btnPlay.addEventListener('click', () => {
            updateCanvasSize();
            if (isPlaying) {
                hiddenVideo.pause();
                isPlaying = false;
                btnPlay.innerText = "Play Scaled Video";
                cancelAnimationFrame(animationFrameId);
            } else {
                hiddenVideo.play();
                isPlaying = true;
                btnPlay.innerText = "Pause";
                drawFrame();
            }
        });

        // Record Logic
        btnRecord.addEventListener('click', () => {
            if (btnRecord.innerText.includes("Record")) {
                startRecording();
            } else {
                stopRecording();
            }
        });

        function startRecording() {
            updateCanvasSize();
            recordedChunks = [];
            
            // Capture stream from canvas at 30 FPS
            const stream = renderCanvas.captureStream(30); 
            
            // Try to add audio track from original video if it exists
            // Note: This works best if the video isn't muted
            let audioTrack = null;
            if (hiddenVideo.captureStream) {
                const videoStream = hiddenVideo.captureStream();
                if (videoStream.getAudioTracks().length > 0) {
                    audioTrack = videoStream.getAudioTracks()[0];
                    stream.addTrack(audioTrack);
                }
            } else if (hiddenVideo.mozCaptureStream) {
                const videoStream = hiddenVideo.mozCaptureStream();
                if (videoStream.getAudioTracks().length > 0) {
                    audioTrack = videoStream.getAudioTracks()[0];
                    stream.addTrack(audioTrack);
                }
            }

            try {
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            } catch (e) {
                mediaRecorder = new MediaRecorder(stream); // Fallback
            }

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'pixel-upscaled.webm';
                a.click();
                URL.revokeObjectURL(url);
                statusText.innerText = "Recording saved!";
            };

            // Restart video to capture from the beginning
            hiddenVideo.currentTime = 0;
            hiddenVideo.play();
            isPlaying = true;
            btnPlay.innerText = "Pause";
            drawFrame();
            
            mediaRecorder.start();
            btnRecord.innerText = "Stop & Save Recording";
            btnRecord.style.background = "#f38ba8"; // Red warning color
            statusText.innerText = "Recording... Click Stop to save.";
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
            hiddenVideo.pause();
            isPlaying = false;
            btnPlay.innerText = "Play Scaled Video";
            btnRecord.innerText = "Record & Save (WebM)";
            btnRecord.style.background = "#89b4fa"; // Revert color
        }
    </script>
</body>
</html>
